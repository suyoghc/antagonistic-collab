name: debate_ablation
description: "3x2: No-Debate/Debate-No-Arbiter/Debate-Arbiter x Thompson/Greedy across 3 ground truths"

defaults:
  cycles: 5
  mode: full_pool
  design_space: continuous
  n_continuous_samples: 50
  backend: princeton
  model: gpt-4o
  learning_rate: 0.005
  arbiter: true
  crux_weight: 0.3
  claim_responsive: true
  selection_strategy: thompson
  no_debate: false

ground_truths:
  - GCM
  - SUSTAIN
  - RULEX

conditions:
  # --- Thompson sampling ---
  thompson_no_debate:
    selection_strategy: thompson
    no_debate: true
    arbiter: false
  thompson_debate_no_arbiter:
    selection_strategy: thompson
    no_debate: false
    arbiter: false
  thompson_debate_arbiter:
    selection_strategy: thompson
    no_debate: false
    arbiter: true

  # --- Greedy (argmax EIG) ---
  greedy_no_debate:
    selection_strategy: greedy
    no_debate: true
    arbiter: false
  greedy_debate_no_arbiter:
    selection_strategy: greedy
    no_debate: false
    arbiter: false
  greedy_debate_arbiter:
    selection_strategy: greedy
    no_debate: false
    arbiter: true
